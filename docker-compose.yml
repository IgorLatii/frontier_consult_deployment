services:
  mysql:
    image: mysql:8
    container_name: mysql_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - ./initdb/Dump20250413:/docker-entrypoint-initdb.d
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"

  fastapi:
    image: ghcr.io/igorlatii/fastapi-ai:latest
#    build:
#      context: /home/igor/Projects/ai_for_chatbot
#      dockerfile: Dockerfile
    container_name: ai_service
    environment:
      db_host: mysql
      db_port: ${DB_PORT}
      db_name: ${MYSQL_DATABASE}
      db_user: ${MYSQL_USER}
      db_password: ${MYSQL_PASSWORD}
      openai_api_key: ${OPENAI_API_KEY}
    depends_on:
      - mysql
    restart: unless-stopped
    ports:
      - "8000:8000"



  django:
    image: ghcr.io/igorlatii/django-admin:latest
    container_name: admin_panel
    environment:
      DB_HOST: mysql
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJ_HOST: ${DJ_HOST}
      DB_PORT: ${DB_PORT}
    depends_on:
      - mysql
    restart: unless-stopped
    ports:
      - "8001:8001"

  bot:
    image: ghcr.io/igorlatii/telegram-bot:latest
    container_name: telegram_bot
    restart: unless-stopped
    environment:
        BOT_NAME: ${BOT_NAME}
        BOT_TOKEN: ${BOT_TOKEN}
        BOT_OWNER: ${BOT_OWNER}
        MYSQL_HOST: mysql
        MYSQL_DATABASE: ${MYSQL_DATABASE}
        MYSQL_USER: ${MYSQL_USER}
        MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
        - mysql
    ports:
        - "8080:8080"

volumes:
  mysql_data: